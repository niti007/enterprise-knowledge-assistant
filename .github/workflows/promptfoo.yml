# Promptfoo eval in CI.
#
# Builds the corpus + local ChromaDB index, (optionally) the Neo4j graph, starts
# the FastAPI server, then runs the 31-case Promptfoo suite against /chat.
#
# Required GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   OPENAI_API_KEY   - your OpenRouter key (sk-or-v1-...)
#   NEO4J_URI        - neo4j+s://<id>.databases.neo4j.io   (optional; graph step)
#   NEO4J_PASSWORD   - Aura password                        (optional; graph step)
#   LANGFUSE_PUBLIC_KEY / LANGFUSE_SECRET_KEY               (optional)
#
# Embeddings run locally (ONNX MiniLM) so no embedding API/key is needed.

name: promptfoo-eval

on:
  workflow_dispatch:        # manual "Run workflow" button
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  eval:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_BASE_URL: https://openrouter.ai/api/v1
      EMBEDDING_PROVIDER: local
      LLM_DEFAULT_MODEL: openai/gpt-4o-mini
      LLM_ADVANCED_MODEL: openai/gpt-4o
      NEO4J_URI: ${{ secrets.NEO4J_URI }}
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${{ secrets.NEO4J_PASSWORD }}
      NEO4J_DATABASE: neo4j
      LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
      LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
      LANGFUSE_HOST: https://cloud.langfuse.com

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm

      - name: Guard — require OpenRouter key
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret not set — add your OpenRouter key."
            exit 1
          fi

      - name: Generate corpus + build vector index (local embeddings)
        run: |
          python -m app.ingestion.generate_fake_data
          python -m app.ingestion.chunker

      - name: Build knowledge graph (optional — needs Neo4j secrets)
        if: ${{ env.NEO4J_URI != '' && env.NEO4J_PASSWORD != '' }}
        run: python -m app.ingestion.graph_builder

      - name: Start API + wait for health
        run: |
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8001 > api.log 2>&1 &
          for i in $(seq 1 60); do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8001/health || true)
            [ "$code" = "200" ] && { echo "API up"; break; }
            sleep 2
          done
          curl -s http://127.0.0.1:8001/health || (cat api.log; exit 1)

      - name: Run Promptfoo suite
        working-directory: eval
        run: npx -y promptfoo@latest eval -c promptfooconfig.yaml -o ../promptfoo_results.json --no-cache

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-results
          path: |
            promptfoo_results.json
            api.log
